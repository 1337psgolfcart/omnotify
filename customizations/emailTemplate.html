<!DOCTYPE html>
<html lang="en" xmlns:v="urn:schemas-microsoft-com:vml" xmlns:o="urn:schemas-microsoft-com:office:office">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>omnotify Notification</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=League+Spartan:wght@400;700&display=swap');
        
        body {
            margin: 0;
            padding: 0;
            width: 100% !important;
            -webkit-text-size-adjust: 100%;
            -ms-text-size-adjust: 100%;
        }
    </style>
</head>
<body style="margin: 0; padding: 0; background-color: #ffffff; font-family: 'League Spartan', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;">
    <table border="0" cellpadding="0" cellspacing="0" width="100%" style="background-color: #d8d8d8;">
        <tr>
            <td align="center" style="padding: 20px 0;">
                <table border="0" cellpadding="0" cellspacing="0" width="100%" style="max-width: 600px; margin: 0 auto; padding: 20px;">
                    <tr>
                        <td align="center" style="padding-bottom: 20px;">
                            <img src="data:image/png;base64,{{imagebase64}}" alt="omnotify" width="200" style="display: block; border: 0; font-size: 32px; font-weight: bold; color: #000000; font-family: 'League Spartan', Arial, sans-serif;">
                        </td>
                    </tr>
                    
                    <tr>
                        <td align="left" style="color: #333333; font-size: 24px; line-height: 1.5; padding-bottom: 30px;">
                            You have received an omnotify notification:
                        </td>
                    </tr>
                    
                    <tr>
                        <td style="padding-bottom: 40px;">
                            <table border="0" cellpadding="0" cellspacing="0" width="100%" style="border: 2px solid #000000; border-collapse: separate; border-radius: 5px; overflow: hidden;">
                                <thead>
                                    <tr>
                                        <th align="left" style="background-color: #f8f8f8; padding: 12px; border-bottom: 2px solid #000000; font-size: 21px; letter-spacing: 0.05em; color: #000000;">
                                            {{title}}
                                        </th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr>
                                        <td align="left" style="background-color: #d8d8d8; padding: 15px; font-size: 18px; font-weight: 700; color: #333333;">
                                            {{message}}
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                        </td>
                    </tr>

                    <tr>
                        <td align="center" style="border-top: 1px solid #aaaaaa; padding-top: 20px; color: #777777; font-size: 14px;">
                            <strong>Sent at:</strong><br> {{time}}
                        </td>
                    </tr>
                </table>
            </td>
        </tr>
    </table>
</body>
</html>
